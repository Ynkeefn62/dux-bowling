<svg xmlns="http://www.w3.org/2000/svg" width="360" height="420" viewBox="0 0 360 420">
  <defs>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity=".18"/>
    </filter>
  </defs>

  <!-- Transparent background -->
  <g filter="url(#softShadow)">
    <!-- Body base -->
    <path d="M80 390c8-70 45-120 100-120s92 50 100 120"
          fill="#ffffff" stroke="#c75a1d" stroke-width="6" stroke-linecap="round"/>
    <!-- Neck -->
    <path d="M155 250c2 18 1 34-4 45 10 10 43 10 53 0-5-11-6-27-4-45"
          fill="#f2c7a6" stroke="#c75a1d" stroke-width="6" stroke-linejoin="round"/>
    <!-- Head -->
    <path d="M110 165c0-58 35-98 70-104 54-9 98 32 98 93 0 69-33 116-90 116s-78-47-78-105z"
          fill="#f2c7a6" stroke="#c75a1d" stroke-width="6" stroke-linejoin="round"/>
    <!-- Ear -->
    <path d="M108 172c-14 0-22 10-22 24s8 24 22 24"
          fill="#f2c7a6" stroke="#c75a1d" stroke-width="6" stroke-linecap="round"/>
    <!-- Cheek blush -->
    <ellipse cx="142" cy="200" rx="16" ry="10" fill="#eaa6a6" opacity=".35"/>
    <ellipse cx="244" cy="200" rx="16" ry="10" fill="#eaa6a6" opacity=".35"/>

    <!-- Eyes -->
    <g>
      <ellipse cx="150" cy="170" rx="22" ry="16" fill="#fff" stroke="#c75a1d" stroke-width="5"/>
      <ellipse cx="235" cy="170" rx="22" ry="16" fill="#fff" stroke="#c75a1d" stroke-width="5"/>
      <circle cx="156" cy="174" r="7" fill="#2b1d12"/>
      <circle cx="241" cy="174" r="7" fill="#2b1d12"/>
      <circle cx="159" cy="171" r="2" fill="#fff"/>
      <circle cx="244" cy="171" r="2" fill="#fff"/>
    </g>

    <!-- Eyebrows -->
    <path d="M132 150c16-12 36-14 52-5" fill="none" stroke="#2b1d12" stroke-width="6" stroke-linecap="round"/>
    <path d="M257 150c-16-12-36-14-52-5" fill="none" stroke="#2b1d12" stroke-width="6" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M195 175c8 16 6 26-8 32" fill="none" stroke="#c75a1d" stroke-width="5" stroke-linecap="round"/>

    <!-- Mouth -->
    <path d="M162 224c20 18 54 18 74 0"
          fill="none" stroke="#c75a1d" stroke-width="6" stroke-linecap="round"/>
    <path d="M175 236c16 10 34 10 50 0"
          fill="none" stroke="#e46a2e" stroke-width="5" stroke-linecap="round" opacity=".6"/>

    <!-- Collar placeholder (shirt underlay) -->
    <path d="M120 300c18-18 46-30 68-30s50 12 68 30"
          fill="#ffffff" stroke="#c75a1d" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>